name: Deploy

on:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout specific SHA
        if: ${{ github.event.client_payload.sha != '' }}
        run: git checkout ${{ github.event.client_payload.sha }}

      - name: Deploy info
        run: |
          echo "Deploying to ${{ github.event.client_payload.environment }}"
          echo "Module: ${{ github.event.client_payload.module }}"
          echo "SHA: ${{ github.event.client_payload.sha }}"
          echo "Installation ID: ${{ github.event.client_payload.installation_id }}"
          echo "Current commit: $(git rev-parse HEAD)"

      - name: Simulate deployment
        run: |
          echo "Simulating deployment process..."
          sleep 5
          echo "Deployment completed successfully!"

      - name: Callback to Release Hub
        if: ${{ github.event.client_payload.callback_url != '' }}
        env:
          CALLBACK_URL: ${{ github.event.client_payload.callback_url }}
          CALLBACK_TOKEN: ${{ github.event.client_payload.callback_token }}
          INSTALLATION_ID: ${{ github.event.client_payload.installation_id }}
        run: |
          curl -X POST "$CALLBACK_URL" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: $CALLBACK_TOKEN" \
            -d "{
              \"installationId\": \"$INSTALLATION_ID\",
              \"status\": \"success\",
              \"message\": \"Deployment completed successfully via GitHub Actions\"
            }"
