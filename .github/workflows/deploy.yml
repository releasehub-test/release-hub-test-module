name: Deploy

on:
  repository_dispatch:
    types: [deploy]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha }}

      - name: Deploy info
        run: |
          echo "🚀 Deploying to ${{ github.event.client_payload.environment }}"
          echo "Module: ${{ github.event.client_payload.module }}"
          echo "SHA: ${{ github.event.client_payload.sha }}"
          echo "Installation ID: ${{ github.event.client_payload.installation_id }}"

      - name: Simulate deployment
        run: |
          echo "Simulating deployment process..."
          sleep 5
          echo "Deployment completed successfully!"

      - name: Callback to Release Hub
        if: ${{ github.event.client_payload.callback_url != '' }}
        run: |
          curl -X POST "${{ github.event.client_payload.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ github.event.client_payload.callback_token }}" \
            -d '{
              "status": "SUCCESS",
              "message": "Deployment completed successfully via GitHub Actions"
            }'
